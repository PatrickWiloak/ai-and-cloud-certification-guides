name: Link check

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC, catches vendor URL drift
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --max-concurrency 8
            --timeout 30
            --retry-wait-time 10
            --max-retries 2
            --accept 200,206,403,429
            --exclude-loopback
            --exclude-mail
            './**/*.md'
          fail: false
          output: ./lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md

      - name: Open issue on weekly run failure
        if: github.event_name == 'schedule' && failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Weekly link check found broken links'
          content-filepath: ./lychee-report.md
          labels: link-check, automated
